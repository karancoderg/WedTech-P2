<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b35309",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221810",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>WedSync Guest RSVP</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Sticky Top Bar -->
<header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-primary/10 px-4 py-3 flex items-center justify-between">
<button class="flex items-center justify-center p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-serif text-xl font-bold text-primary">Priya &amp; Rahul</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-md mx-auto p-4 pb-32 space-y-6">
<!-- RSVP Attendance Card -->
<section class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-primary/5">
<h2 class="text-xl font-bold text-center mb-6 leading-tight">Will you be attending the Sangeet?</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Yes Option -->
<div class="relative group cursor-pointer border-2 border-green-500 bg-green-50 dark:bg-green-900/10 p-4 rounded-xl flex flex-col items-center text-center transition-all">
<div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white mb-3">
<span class="material-symbols-outlined text-2xl">check</span>
</div>
<p class="font-semibold text-green-700 dark:text-green-400">Yes, I'm coming!</p>
<div class="absolute top-2 right-2">
<span class="material-symbols-outlined text-green-500 text-lg">check_circle</span>
</div>
</div>
<!-- No Option -->
<div class="relative group cursor-pointer border border-slate-200 dark:border-slate-700 hover:border-red-200 p-4 rounded-xl flex flex-col items-center text-center transition-all">
<div class="w-12 h-12 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-400 mb-3">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<p class="font-medium text-slate-600 dark:text-slate-400">No, I can't make it</p>
</div>
</div>
</section>
<!-- Details Section -->
<section class="space-y-4">
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 px-1">RSVP Details</h3>
<!-- Number of Plus-Ones -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl flex items-center justify-between border border-primary/5">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">person_add</span>
</div>
<span class="font-medium">Number of Plus-Ones</span>
</div>
<div class="flex items-center gap-4 bg-background-light dark:bg-slate-800 p-1 rounded-full">
<button class="w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-700 rounded-full shadow-sm text-primary">-</button>
<span class="w-4 text-center font-bold">1</span>
<button class="w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-700 rounded-full shadow-sm text-primary">+</button>
</div>
</div>
<!-- Number of Children -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl flex items-center justify-between border border-primary/5">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">child_care</span>
</div>
<span class="font-medium">Number of Children</span>
</div>
<div class="flex items-center gap-4 bg-background-light dark:bg-slate-800 p-1 rounded-full">
<button class="w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-700 rounded-full shadow-sm text-primary">-</button>
<span class="w-4 text-center font-bold">0</span>
<button class="w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-700 rounded-full shadow-sm text-primary">+</button>
</div>
</div>
<!-- Dietary Preferences -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-primary/5 space-y-3">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">restaurant</span>
</div>
<span class="font-medium">Dietary Preferences</span>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-white font-medium text-sm flex items-center gap-1">
                        Veg 🥦
                    </button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-slate-700 dark:text-slate-300 font-medium text-sm flex items-center gap-1">
                        Jain 🌿
                    </button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-slate-700 dark:text-slate-300 font-medium text-sm flex items-center gap-1">
                        Non-Veg 🍗
                    </button>
</div>
</div>
<!-- Accommodation Toggle -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl flex items-center justify-between border border-primary/5">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">hotel</span>
</div>
<div>
<span class="font-medium block">Accommodation</span>
<span class="text-xs text-slate-500">Need a room at the venue?</span>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</section>
<!-- Personal Note -->
<section class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-primary/5">
<label class="block text-sm font-medium mb-2 text-slate-700 dark:text-slate-300">A message for the couple (Optional)</label>
<textarea class="w-full rounded-lg border-primary/10 bg-background-light dark:bg-slate-800 focus:border-primary focus:ring-primary text-sm p-3" placeholder="Can't wait to see you both!" rows="3"></textarea>
</section>
</main>
<!-- Fixed Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-primary/10">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                Confirm My RSVP
                <span class="material-symbols-outlined text-xl">check</span>
</button>
</div>
</div>
</body></html>
