<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WedSync Planner Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b35c09",
                        "background-light": "#FAFAF9",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen flex-col items-center justify-center p-4">
<!-- Header/Nav equivalent for Login Page -->
<div class="absolute top-0 w-full px-6 py-8 flex justify-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">filter_vintage</span>
<h1 class="font-serif text-3xl font-bold text-slate-900 dark:text-slate-100">WedSync</h1>
</div>
</div>
<!-- Main Login Card -->
<main class="w-full max-w-[420px] bg-white dark:bg-slate-900 rounded-2xl shadow-xl shadow-primary/5 border border-primary/10 overflow-hidden">
<div class="px-8 pt-10 pb-8">
<!-- Logo and Tagline -->
<div class="text-center mb-8">
<p class="text-primary font-medium text-sm uppercase tracking-widest mb-2">Smart RSVP &amp; Guest Management</p>
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Sign in to your planner account</h2>
</div>
<!-- Social Login -->
<div class="space-y-4">
<button class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<!-- Divider -->
<div class="relative py-4">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-2 text-slate-500">or continue with email</span>
</div>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="return false;">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" for="email">Email address</label>
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary sm:text-sm py-3" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<div>
<div class="flex items-center justify-between mb-1">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary/80" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary sm:text-sm py-3" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<button class="flex w-full items-center justify-center rounded-xl bg-primary px-4 py-3.5 text-sm font-bold text-white shadow-sm hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-all" type="submit">
                        Sign In
                    </button>
</form>
</div>
</div>
<!-- Card Footer -->
<div class="bg-slate-50 dark:bg-slate-800/50 px-8 py-5 text-center border-t border-slate-100 dark:border-slate-800">
<p class="text-sm text-slate-600 dark:text-slate-400">
                New here? <a class="font-semibold text-primary hover:text-primary/80" href="#">Create your planner account</a>
</p>
</div>
</main>
<!-- Page Footer -->
<footer class="mt-12 text-center">
<p class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-tighter">
            WedSync — Built for Indian Weddings
        </p>
</footer>
<!-- Decorative background elements -->
<div class="fixed top-0 left-0 -z-10 h-64 w-64 bg-primary/5 rounded-full blur-3xl opacity-50 -translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 right-0 -z-10 h-96 w-96 bg-primary/10 rounded-full blur-3xl opacity-30 translate-x-1/4 translate-y-1/4"></div>
</div>
</body></html>
