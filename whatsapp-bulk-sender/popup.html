<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #FAFAF9;
    }
    h2 {
      margin-top: 0;
      color: #0f172a;
      font-size: 18px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 12px;
      font-family: monospace;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #25D366; /* WhatsApp Green */
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #1DA851;
    }
    button:disabled {
      background-color: #94A3B8;
      cursor: not-allowed;
    }
    button.stop-btn {
      background-color: #ef4444;
      margin-top: 8px;
      display: none;
    }
    button.stop-btn:hover {
      background-color: #dc2626;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #475569;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h2>WedSync Bulk Sender</h2>
  <p style="font-size: 12px; color: #64748b; margin-top: -10px; margin-bottom: 16px;">
    Open WhatsApp Web, then paste the JSON array exported from WedSync.
  </p>
  
  <textarea id="jsonInput" placeholder='[{"phone": "919000000000", "message": "Hi!"}]'></textarea>
  <button id="startBtn">Start Sending</button>
  <button id="stopBtn" class="stop-btn">Stop Sending</button>
  
  <div id="status">Ready.</div>
  
  <script src="popup.js"></script>
</body>
</html>
