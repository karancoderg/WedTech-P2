<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WedSync Guest RSVP Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b35309",
                        "background-light": "#fafaf9",
                        "background-dark": "#221810",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto bg-background-light dark:bg-background-dark pb-32">
<!-- Top Navigation -->
<header class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-primary/10">
<button class="text-primary flex size-10 items-center justify-center rounded-full hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Priya &amp; Rahul</h2>
</header>
<main class="flex flex-col gap-6 p-4">
<!-- Progress Section -->
<div class="flex flex-col gap-3">
<div class="flex gap-6 justify-between items-end">
<div>
<p class="text-primary text-xs font-bold uppercase tracking-wider">Step 2 of 3</p>
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold">RSVP Details</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">60% Complete</p>
</div>
<div class="h-1.5 w-full rounded-full bg-primary/10 overflow-hidden">
<div class="h-full rounded-full bg-primary transition-all duration-500" style="width: 60%;"></div>
</div>
</div>
<!-- Attendance Card -->
<section class="bg-white dark:bg-slate-900/50 rounded-xl p-6 shadow-sm border border-primary/5">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-xl font-bold leading-tight text-center mb-6">Will you join us for the Sangeet?</h3>
<div class="grid grid-cols-2 gap-4">
<label class="relative flex flex-col items-center gap-3 p-4 rounded-xl border-2 border-primary/10 cursor-pointer transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 group">
<input checked="" class="hidden peer" name="attendance" type="radio"/>
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20">
<span class="material-symbols-outlined text-3xl">celebration</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Yes, I'll be there</span>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined text-lg">check_circle</span>
</div>
</label>
<label class="relative flex flex-col items-center gap-3 p-4 rounded-xl border-2 border-primary/10 cursor-pointer transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 group">
<input class="hidden peer" name="attendance" type="radio"/>
<div class="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-400 group-hover:bg-slate-200">
<span class="material-symbols-outlined text-3xl">event_busy</span>
</div>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">Regretfully No</span>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined text-lg">check_circle</span>
</div>
</label>
</div>
</section>
<!-- Stepper Inputs -->
<section class="flex flex-col gap-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Additional Guests</h3>
<!-- Adults Stepper -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900/50 rounded-xl border border-primary/5">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-lg text-primary">
<span class="material-symbols-outlined">person</span>
</div>
<div>
<p class="font-bold text-slate-900 dark:text-slate-100">Adults</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Above 12 years</p>
</div>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full border border-primary/20 flex items-center justify-center text-primary hover:bg-primary/5">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-lg font-bold w-4 text-center">1</span>
<button class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white shadow-md shadow-primary/20">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Kids Stepper -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900/50 rounded-xl border border-primary/5">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-lg text-primary">
<span class="material-symbols-outlined">child_care</span>
</div>
<div>
<p class="font-bold text-slate-900 dark:text-slate-100">Kids</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Below 12 years</p>
</div>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full border border-primary/20 flex items-center justify-center text-primary hover:bg-primary/5">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-lg font-bold w-4 text-center text-slate-400">0</span>
<button class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white shadow-md shadow-primary/20">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</section>
<!-- Dietary Preferences -->
<section class="flex flex-col gap-4 pt-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Dietary Preference</h3>
<div class="flex flex-wrap gap-2">
<label class="flex items-center gap-2 px-4 py-2.5 rounded-full border border-primary/20 bg-white dark:bg-slate-900 cursor-pointer has-[:checked]:bg-primary has-[:checked]:text-white transition-colors">
<input checked="" class="hidden" name="diet" type="radio"/>
<span class="material-symbols-outlined text-lg">eco</span>
<span class="text-sm font-semibold">Vegetarian</span>
</label>
<label class="flex items-center gap-2 px-4 py-2.5 rounded-full border border-primary/20 bg-white dark:bg-slate-900 cursor-pointer has-[:checked]:bg-primary has-[:checked]:text-white transition-colors">
<input class="hidden" name="diet" type="radio"/>
<span class="material-symbols-outlined text-lg">spa</span>
<span class="text-sm font-semibold">Jain</span>
</label>
<label class="flex items-center gap-2 px-4 py-2.5 rounded-full border border-primary/20 bg-white dark:bg-slate-900 cursor-pointer has-[:checked]:bg-primary has-[:checked]:text-white transition-colors">
<input class="hidden" name="diet" type="radio"/>
<span class="material-symbols-outlined text-lg">restaurant</span>
<span class="text-sm font-semibold">Non-Veg</span>
</label>
</div>
</section>
<!-- Message Box -->
<section class="flex flex-col gap-3 pt-2">
<label class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Special Requests</label>
<textarea class="w-full rounded-xl border-primary/10 bg-white dark:bg-slate-900/50 p-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary min-h-[100px] transition-all" placeholder="Allergies, wheelchair access, or a sweet note for the couple..."></textarea>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-xl border-t border-primary/10 z-50">
<div class="max-w-[430px] mx-auto">
<button class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/30 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                    Confirm My RSVP
                    <span class="material-symbols-outlined">check_circle</span>
</button>
<p class="text-center text-xs text-slate-400 mt-3 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">lock</span>
                    Your response is secure and private
                </p>
</div>
</div>
</div>
</body></html>
